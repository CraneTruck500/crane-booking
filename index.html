<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crane Truck Booking System – Tyris Construction</title>
<style>
  :root {
    --brand:      #4A2D8F;
    --brand-mid:  #6B46C1;
    --brand-lite: #EDE9F8;
    --accent:     #F59E0B;
    --danger:     #DC2626;
    --success:    #16A34A;
    --text:       #1A1A2E;
    --muted:      #6B7280;
    --border:     #D1D5DB;
    --surface:    #FFFFFF;
    --page-bg:    #F5F3FF;
    --card-shadow: 0 2px 12px rgba(74,45,143,.10);
    --radius:     10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--page-bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  header {
    background: var(--brand);
    color: #fff;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    position: sticky; top: 0; z-index: 100;
  }
  header .logo { font-size: 15px; font-weight: 700; letter-spacing: .4px; }
  header .logo span { color: var(--accent); }

  nav { display: flex; gap: 4px; }
  nav button {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,.35);
    color: #fff;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  nav button:hover  { background: rgba(255,255,255,.12); }
  nav button.active { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.7); font-weight: 600; }

  /* ── LAYOUT ── */
  main { max-width: 680px; margin: 0 auto; padding: 28px 16px 60px; }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 28px 28px;
    margin-bottom: 16px;
  }
  .card-title-bar {
    background: linear-gradient(135deg, var(--brand), var(--brand-mid));
    color: #fff;
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 22px 28px 18px;
    margin: -28px -28px 24px;
  }
  .card-title-bar h1 { font-size: 22px; font-weight: 700; }
  .card-title-bar p  { font-size: 13px; opacity: .8; margin-top: 4px; }

  /* ── FORM FIELDS ── */
  .field { margin-bottom: 22px; }
  .field label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }
  .field label .req { color: var(--danger); margin-left: 3px; }

  .field input[type="text"],
  .field input[type="date"],
  .field input[type="time"],
  .field select,
  .field textarea {
    width: 100%;
    padding: 10px 13px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: 14px;
    color: var(--text);
    background: #fff;
    transition: border-color .15s, box-shadow .15s;
    outline: none;
    font-family: inherit;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: var(--brand-mid);
    box-shadow: 0 0 0 3px rgba(107,70,193,.12);
  }
  .field textarea { resize: vertical; min-height: 90px; }

  /* radio / checkbox group */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .options label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 400;
    cursor: pointer;
    padding: 9px 13px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    transition: background .12s, border-color .12s;
  }
  .options label:hover { background: var(--brand-lite); border-color: var(--brand-mid); }
  .options label input { accent-color: var(--brand-mid); width: 16px; height: 16px; flex-shrink: 0; }
  .options label.checked { background: var(--brand-lite); border-color: var(--brand-mid); }

  /* "Other" text input inside radio list */
  .other-input {
    display: none;
    margin-top: 8px;
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .other-input:focus { border-color: var(--brand-mid); box-shadow: 0 0 0 3px rgba(107,70,193,.12); }
  .other-input.visible { display: block; }

  /* ── SUBMIT ROW ── */
  .form-actions {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--brand);
    color: #fff;
    border: none;
    padding: 11px 28px;
    border-radius: 7px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .btn-primary:hover  { background: var(--brand-mid); }
  .btn-primary:active { transform: scale(.97); }

  .btn-ghost {
    background: transparent;
    color: var(--brand);
    border: 1.5px solid var(--brand);
    padding: 11px 22px;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-ghost:hover { background: var(--brand-lite); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--success);
    color: #fff;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,.2);
    transition: transform .3s ease, opacity .3s ease;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── SUBMISSIONS VIEW ── */
  .summary-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 16px 20px;
    text-align: center;
  }
  .stat .num { font-size: 28px; font-weight: 800; color: var(--brand); }
  .stat .lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* filters */
  .filters {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 14px 18px;
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters input, .filters select {
    padding: 7px 11px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  .filters input:focus, .filters select:focus { border-color: var(--brand-mid); }

  /* booking cards in list */
  .booking-list { display: flex; flex-direction: column; gap: 12px; }

  .booking-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    border-left: 5px solid var(--brand-mid);
    padding: 16px 18px;
    position: relative;
  }
  .booking-card .bc-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .booking-card .bc-site {
    font-size: 15px;
    font-weight: 700;
    color: var(--brand);
  }
  .booking-card .bc-date {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }
  .booking-card .bc-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .tag {
    background: var(--brand-lite);
    color: var(--brand);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 600;
  }
  .tag.duration { background: #FEF3C7; color: #92400E; }
  .tag.load     { background: #DCFCE7; color: #166534; }

  .booking-card .bc-notes {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.5;
  }
  .booking-card .bc-submitter {
    margin-top: 6px;
    font-size: 12px;
    color: #9CA3AF;
  }

  .delete-btn {
    position: absolute;
    top: 12px; right: 12px;
    background: transparent;
    border: none;
    color: #D1D5DB;
    font-size: 16px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color .15s, background .15s;
    line-height: 1;
  }
  .delete-btn:hover { color: var(--danger); background: #FEE2E2; }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Submitter name on form */
  .submitter-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 520px) {
    .card { padding: 20px 16px; }
    .card-title-bar { margin: -20px -16px 20px; padding: 18px 18px 14px; }
    .card-title-bar h1 { font-size: 19px; }
    .filters { flex-direction: column; }
    .filters input, .filters select { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Tyris <span>Construction</span> · Crane Truck Bookings</div>
  <nav>
    <button class="active" id="tab-form"  onclick="switchView('form')">New Booking</button>
    <button              id="tab-list"  onclick="switchView('list')">Submissions</button>
  </nav>
</header>

<main>

  <!-- ══════════ BOOKING FORM ══════════ -->
  <div id="view-form" class="view active">
    <div class="card">
      <div class="card-title-bar">
        <h1>Crane Truck Booking Request</h1>
        <p>Complete all required fields and submit. Your booking will appear in the Submissions log.</p>
      </div>

      <!-- Submitter Name -->
      <div class="field">
        <label for="f-name">Your Name <span class="req">*</span></label>
        <input type="text" id="f-name" placeholder="e.g. Jan van der Merwe" maxlength="100">
      </div>

      <!-- Site Name -->
      <div class="field">
        <label for="f-site">Site Name / Location <span class="req">*</span></label>
        <input type="text" id="f-site" placeholder="e.g. Woodmead Western Woods" maxlength="120">
      </div>

      <!-- Date -->
      <div class="field">
        <label for="f-date">Requested Date <span class="req">*</span></label>
        <input type="date" id="f-date">
      </div>

      <!-- Start Time -->
      <div class="field">
        <label for="f-time">Start Time <span class="req">*</span></label>
        <input type="time" id="f-time">
      </div>

      <!-- Duration -->
      <div class="field">
        <label for="f-duration">Estimated Duration <span class="req">*</span></label>
        <select id="f-duration">
          <option value="">— Select duration —</option>
          <option>1–2 Hours</option>
          <option>Half-Day</option>
          <option>Full Day</option>
        </select>
      </div>

      <!-- Load Type -->
      <div class="field">
        <label>Load Type <span class="req">*</span></label>
        <div class="options" id="load-options">
          <label id="lbl-container">
            <input type="radio" name="loadtype" value="Container"> Container
          </label>
          <label id="lbl-plant">
            <input type="radio" name="loadtype" value="Plant / Machinery"> Plant / Machinery
          </label>
          <label id="lbl-materials">
            <input type="radio" name="loadtype" value="Materials"> Materials (Bricks, tiles, etc.)
          </label>
          <label id="lbl-other">
            <input type="radio" name="loadtype" value="Other"> Other
            <input type="text" class="other-input" id="load-other-text" placeholder="Please specify…" maxlength="80">
          </label>
        </div>
      </div>

      <!-- Notes -->
      <div class="field">
        <label for="f-notes">Description / Notes</label>
        <textarea id="f-notes" placeholder="Any special requirements, access instructions, or additional details…"></textarea>
      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="submitForm()">Submit Booking</button>
        <button class="btn-ghost"   onclick="clearForm()">Clear Form</button>
      </div>
    </div>
  </div>

  <!-- ══════════ SUBMISSIONS LIST ══════════ -->
  <div id="view-list" class="view">

    <div class="summary-bar" id="summary-bar">
      <div class="stat"><div class="num" id="stat-total">0</div><div class="lbl">Total Bookings</div></div>
      <div class="stat"><div class="num" id="stat-upcoming">0</div><div class="lbl">Upcoming</div></div>
      <div class="stat"><div class="num" id="stat-today">0</div><div class="lbl">Today</div></div>
    </div>

    <div class="filters">
      <input type="text"   id="filter-search"   placeholder="🔍  Search site or name…" oninput="renderList()">
      <select id="filter-duration" onchange="renderList()">
        <option value="">All Durations</option>
        <option>1–2 Hours</option>
        <option>Half-Day</option>
        <option>Full Day</option>
      </select>
      <select id="filter-load" onchange="renderList()">
        <option value="">All Load Types</option>
        <option>Container</option>
        <option>Plant / Machinery</option>
        <option>Materials</option>
        <option>Other</option>
      </select>
    </div>

    <div class="booking-list" id="booking-list"></div>
  </div>

</main>

<div id="toast">✓ Booking submitted successfully!</div>

<script>
/* ── Storage helpers ── */
const KEY = 'tyris_crane_bookings';

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; }
  catch { return []; }
}
function save(data) { localStorage.setItem(KEY, JSON.stringify(data)); }

/* ── View switching ── */
function switchView(v) {
  document.getElementById('view-form').classList.toggle('active', v === 'form');
  document.getElementById('view-list').classList.toggle('active', v === 'list');
  document.getElementById('tab-form').classList.toggle('active', v === 'form');
  document.getElementById('tab-list').classList.toggle('active', v === 'list');
  if (v === 'list') renderList();
}

/* ── Radio checked style ── */
document.querySelectorAll('.options input[type="radio"]').forEach(r => {
  r.addEventListener('change', () => {
    document.querySelectorAll('.options label').forEach(l => l.classList.remove('checked'));
    if (r.checked) {
      r.closest('label').classList.add('checked');
      const ot = document.getElementById('load-other-text');
      ot.classList.toggle('visible', r.value === 'Other');
    }
  });
});

/* ── Submit ── */
function submitForm() {
  const name     = document.getElementById('f-name').value.trim();
  const site     = document.getElementById('f-site').value.trim();
  const date     = document.getElementById('f-date').value;
  const time     = document.getElementById('f-time').value;
  const duration = document.getElementById('f-duration').value;
  const loadRadio = document.querySelector('input[name="loadtype"]:checked');
  const notes    = document.getElementById('f-notes').value.trim();

  // Validation
  const errs = [];
  if (!name)         errs.push('Your Name');
  if (!site)         errs.push('Site Name / Location');
  if (!date)         errs.push('Requested Date');
  if (!time)         errs.push('Start Time');
  if (!duration)     errs.push('Estimated Duration');
  if (!loadRadio)    errs.push('Load Type');

  if (errs.length) {
    alert('Please complete the following required fields:\n• ' + errs.join('\n• '));
    return;
  }

  let loadType = loadRadio.value;
  if (loadType === 'Other') {
    const ot = document.getElementById('load-other-text').value.trim();
    loadType = ot ? 'Other: ' + ot : 'Other';
  }

  const booking = {
    id:        Date.now(),
    name,
    site,
    date,
    time,
    duration,
    loadType,
    notes,
    submitted: new Date().toISOString()
  };

  const all = load();
  all.unshift(booking);
  save(all);

  showToast();
  clearForm();
}

/* ── Clear ── */
function clearForm() {
  document.getElementById('f-name').value     = '';
  document.getElementById('f-site').value     = '';
  document.getElementById('f-date').value     = '';
  document.getElementById('f-time').value     = '';
  document.getElementById('f-duration').value = '';
  document.getElementById('f-notes').value    = '';
  document.querySelectorAll('input[name="loadtype"]').forEach(r => r.checked = false);
  document.querySelectorAll('.options label').forEach(l => l.classList.remove('checked'));
  document.getElementById('load-other-text').classList.remove('visible');
  document.getElementById('load-other-text').value = '';
}

/* ── Toast ── */
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ── Delete ── */
function deleteBooking(id) {
  if (!confirm('Remove this booking?')) return;
  save(load().filter(b => b.id !== id));
  renderList();
}

/* ── Format helpers ── */
function fmtDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function fmtTime(t) {
  if (!t) return '';
  const [h, min] = t.split(':');
  const hr = parseInt(h);
  return `${hr % 12 || 12}:${min} ${hr < 12 ? 'AM' : 'PM'}`;
}
function today() { return new Date().toISOString().split('T')[0]; }

/* ── Render list ── */
function renderList() {
  const all      = load();
  const search   = document.getElementById('filter-search').value.toLowerCase();
  const dur      = document.getElementById('filter-duration').value;
  const load_f   = document.getElementById('filter-load').value;

  // Stats
  const td = today();
  document.getElementById('stat-total').textContent    = all.length;
  document.getElementById('stat-upcoming').textContent = all.filter(b => b.date >= td).length;
  document.getElementById('stat-today').textContent    = all.filter(b => b.date === td).length;

  // Filter
  let filtered = all;
  if (search) filtered = filtered.filter(b =>
    b.site.toLowerCase().includes(search) || b.name.toLowerCase().includes(search));
  if (dur)    filtered = filtered.filter(b => b.duration === dur);
  if (load_f) filtered = filtered.filter(b => b.loadType.startsWith(load_f));

  // Sort newest date first
  filtered.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);

  const container = document.getElementById('booking-list');

  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>${all.length ? 'No bookings match your filters.' : 'No bookings yet. Submit the first one!'}</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(b => `
    <div class="booking-card">
      <button class="delete-btn" onclick="deleteBooking(${b.id})" title="Delete booking">✕</button>
      <div class="bc-header">
        <div class="bc-site">${esc(b.site)}</div>
        <div class="bc-date">📅 ${fmtDate(b.date)} at ${fmtTime(b.time)}</div>
      </div>
      <div class="bc-meta">
        <span class="tag duration">⏱ ${esc(b.duration)}</span>
        <span class="tag load">📦 ${esc(b.loadType)}</span>
      </div>
      ${b.notes ? `<div class="bc-notes">"${esc(b.notes)}"</div>` : ''}
      <div class="bc-submitter">Submitted by ${esc(b.name)} · ${new Date(b.submitted).toLocaleString('en-ZA',{dateStyle:'short',timeStyle:'short'})}</div>
    </div>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Set today as min date on form
document.getElementById('f-date').min = today();

// Initial stats render
renderList();
</script>
</body>
</html>
